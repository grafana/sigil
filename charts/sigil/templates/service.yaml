apiVersion: v1
kind: Service
metadata:
  name: {{ include "sigil.fullname" . }}
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
    - name: otlp-grpc
      port: {{ .Values.service.ports.otlpGrpc }}
      targetPort: otlp-grpc
      protocol: TCP
  selector:
    {{- include "sigil.apiSelectorLabels" . | nindent 4 }}
