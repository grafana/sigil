{{- if .Values.querier.enabled }}
{{ include "sigil.validateStorageBackend" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sigil.fullname" . }}-querier
  labels:
    {{- include "sigil.labels" . | nindent 4 }}
    app.kubernetes.io/component: querier
spec:
  replicas: {{ .Values.querier.replicaCount }}
  selector:
    matchLabels:
      {{- include "sigil.querierSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sigil.querierSelectorLabels" . | nindent 8 }}
        {{- with .Values.querier.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.querier.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "sigil.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: querier
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.querier.service.ports.http }}
              protocol: TCP
            - name: otlp-grpc
              containerPort: {{ .Values.service.ports.otlpGrpc }}
              protocol: TCP
          env:
            {{- include "sigil.commonEnv" (dict "root" . "target" .Values.querier.target "extraEnv" .Values.querier.extraEnv "httpPort" .Values.querier.service.ports.http "otlpGrpcPort" .Values.service.ports.otlpGrpc) | nindent 12 }}
          {{- if or .Values.sigil.extraEnvFrom .Values.querier.extraEnvFrom }}
          envFrom:
            {{- with .Values.sigil.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.querier.extraEnvFrom }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.httpGet.path }}
              port: {{ .Values.startupProbe.httpGet.port }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          {{- end }}
          {{- with .Values.querier.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.querier.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.querier.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.querier.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
