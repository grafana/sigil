# For these datasources to work you'll need a service account token from
# https://ops.grafana-ops.net/org/serviceaccounts exported as
# `GRAFANA_OPS_API_KEY` in your environment (or in .env).
apiVersion: 1

datasources:
  - name: grafanacloud-ops-prom
    uid: grafanacloud-prom
    type: prometheus
    basicAuth: true
    basicAuthUser: "10428"
    url: https://prometheus-ops-03-ops-eu-south-0.grafana-ops.net/api/prom
    isDefault: false
    editable: true
    jsonData:
      exemplarTraceIdDestinations:
        - datasourceUid: grafanacloud-traces
          name: traceID
      httpMethod: POST
    secureJsonData:
      basicAuthPassword: $GRAFANA_OPS_PROM_KEY

  - name: grafanacloud-ops-traces
    uid: grafanacloud-traces
    type: tempo
    basicAuth: true
    basicAuthUser: "1"
    url: https://tempo-ops-01-ops-eu-south-0.grafana-ops.net/tempo
    isDefault: false
    editable: true
    jsonData:
      foo: bar
    secureJsonData:
      basicAuthPassword: $GRAFANA_OPS_TRACES_KEY
