evaluators:
  - id: custom.json_contract.v1
    kind: json_schema
    version: "2026-02-17"
    schema:
      type: object
      required:
        - answer
      properties:
        answer:
          type: string
    output:
      keys:
        - key: json_contract_valid
          type: bool

  - id: custom.no_refusal.v1
    kind: regex
    version: "2026-02-17"
    must_not_match:
      - "(?i)i can't help with that"
      - "(?i)cannot comply"
    output:
      keys:
        - key: no_refusal
          type: bool

rules:
  - id: online.helpfulness.user_visible
    enabled: true
    select:
      selector: user_visible_turn
    match:
      agent_name:
        - assistant-*
      mode:
        - SYNC
    sample:
      rate: 0.1
    evaluators:
      - sigil.helpfulness
      - sigil.response_not_empty

  - id: online.json_contract.api
    enabled: true
    select:
      selector: user_visible_turn
    match:
      operation_name:
        - chat.completion
      tags.output_contract:
        - json
    sample:
      rate: 1.0
    evaluators:
      - custom.json_contract.v1
      - sigil.json_valid

  - id: online.safety.refusal_check
    enabled: true
    select:
      selector: all_assistant_generations
    match:
      agent_name:
        - assistant-*
    sample:
      rate: 0.2
    evaluators:
      - custom.no_refusal.v1
