name: Plugins - CI / CD

on:
  push:
    branches:
      - main
    paths:
      - apps/plugin/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/plugins-push.yml
  pull_request:
    paths:
      - apps/plugin/**
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/plugins-push.yml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions: {}

jobs:
  cd:
    name: CI / CD
    uses: grafana/plugin-ci-workflows/.github/workflows/cd.yml@ci-cd-workflows/v5.1.0
    permissions:
      contents: write
      id-token: write
      attestations: write
      pull-requests: read
    with:
      go-version: '1.25.6'
      go-setup-caching: true
      golangci-lint-version: '2.10.1'
      plugin-directory: apps/plugin

      # Playwright tests are run in dedicated workflows.
      run-playwright: false

      # Checkout/build PR or main branch, depending on event.
      branch: ${{ github.event_name == 'push' && github.ref_name || github.ref }}

      # Publish plugin artifact from main to dev only. PRs run CI only.
      environment: ${{ (github.event_name == 'push' && github.ref_name == 'main') && 'dev' || 'none' }}

      # This workflow only publishes artifacts. Deployment is intentionally disabled.
      trigger-argo: false

      # Keep plugin docs publishing and GitHub releases out of this CI/CD path.
      disable-docs-publishing: true
      disable-github-release: true

      # Add the git head SHA as version suffix for CI/CD builds.
      plugin-version-suffix: ${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
